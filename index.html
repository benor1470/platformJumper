<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Platform Jumper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      pointer-events: none; text-align: center;
      font-family: 'Segoe UI', Arial, sans-serif; color: #fff;
      text-shadow: 0 0 10px #00ffff;
    }
    #score { font-size: 32px; font-weight: bold; }
    #best  { font-size: 14px; color: #88aacc; margin-top: 2px; }

    #msgs {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      pointer-events: none; text-align: center;
    }
    .msg {
      color: #ffdd00; font-size: 20px; font-family: Arial, sans-serif;
      text-shadow: 0 0 12px #ffaa00;
      animation: fadeup 1.1s ease-out forwards;
    }
    @keyframes fadeup {
      0%   { opacity: 1; transform: translateY(0);    }
      100% { opacity: 0; transform: translateY(-50px); }
    }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(3, 5, 25, 0.90);
      font-family: 'Segoe UI', Arial, sans-serif; color: #fff;
    }
    #overlay h1 {
      font-size: clamp(2.2em, 9vw, 4.5em);
      color: #00ffff;
      text-shadow: 0 0 30px #00ffff, 0 0 70px #0088ff;
      margin-bottom: 0.25em;
    }
    .tagline { color: #88ccff; font-size: clamp(0.85em, 2vw, 1.1em); margin-bottom: 0.5em; }
    #record-line { color: #ffdd00; font-size: 1em; min-height: 1.4em; margin-bottom: 1.5em; }
    .start-btn {
      padding: 0.75em 2.8em; font-size: clamp(1em, 3vw, 1.3em);
      background: linear-gradient(135deg, #00ffff, #0077ff);
      color: #000; border: none; border-radius: 50px;
      cursor: pointer; font-weight: bold;
      box-shadow: 0 0 24px #00ffff88;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .start-btn:active, .start-btn:hover {
      transform: scale(1.06); box-shadow: 0 0 38px #00ffff;
    }
    .hints {
      margin-top: 2em; color: #5599cc;
      font-size: clamp(0.72em, 1.8vw, 0.88em);
      text-align: center; line-height: 2;
    }
    .hint-key {
      display: inline-block; padding: 1px 7px;
      border: 1px solid #336699; border-radius: 4px;
      background: rgba(0,100,200,0.2);
    }

    /* Danger vignette */
    #vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(200,0,0,0) 100%);
      opacity: 0; transition: opacity 0.1s;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div id="score">0</div>
  <div id="best">Best: 0</div>
</div>

<div id="msgs"></div>
<div id="vignette"></div>

<div id="overlay">
  <h1>Platform Jumper</h1>
  <p class="tagline">Stay on the platforms — don't fall!</p>
  <div id="record-line"></div>
  <button class="start-btn" id="start-btn">▶ &nbsp;Play</button>
  <div class="hints">
    <span class="hint-key">←</span> <span class="hint-key">→</span> &nbsp;Move
    &nbsp;|&nbsp; Touch left / right side to move<br>
    Collect ⭐ stars for bonus score<br>
    Platforms rotate at score 15 · speed up at 30
  </div>
</div>

<script>
// ============================================================
//  PLATFORM JUMPER — Web Edition
//  Converted from React Native / Expo / Three.js original
// ============================================================

// ── Canvas setup ─────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if (gameState === 'playing') initGame(false); });

// ── roundRect polyfill (for older browsers) ──────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const cr = Math.min(r, w / 2, h / 2);
    this.moveTo(x + cr, y);
    this.lineTo(x + w - cr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + cr);
    this.lineTo(x + w, y + h - cr);
    this.quadraticCurveTo(x + w, y + h, x + w - cr, y + h);
    this.lineTo(x + cr, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - cr);
    this.lineTo(x, y + cr);
    this.quadraticCurveTo(x, y, x + cr, y);
    this.closePath();
  };
}

// ── Constants ────────────────────────────────────────────────
const BOARD_COUNT      = 40;
const BOARD_H          = 13;           // platform thickness (px)
const GRAVITY          = 1300;         // px/s²
const RESTITUTION      = 0.48;         // bounce factor
const PLAYER_R         = 18;           // player radius
const SCORE_PER_SEC    = 1;
const ROTATE_AT        = 15;           // score threshold for rotation
const SPEEDUP_AT       = 30;           // score threshold for speed boost
const SPEED_BOOST      = 1.6;
const SUBSTEPS         = 4;            // physics substeps per frame

// ── State ─────────────────────────────────────────────────────
let gameState = 'menu';  // 'menu' | 'playing'
let score     = 0;
let maxScore  = 0;
let player, boards, pickups;
let lastTime  = null;
let raf       = null;

// ── Input ─────────────────────────────────────────────────────
const keys   = {};
const touch  = { left: false, right: false };

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',   e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches)
    (t.clientX < W / 2 ? (touch.left = true) : (touch.right = true));
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touch.left = touch.right = false;
  for (const t of e.touches)
    (t.clientX < W / 2 ? (touch.left = true) : (touch.right = true));
}, { passive: false });

canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Mouse support (treat like touch)
canvas.addEventListener('mousedown', e => {
  (e.clientX < W / 2 ? (touch.left = true) : (touch.right = true));
});
canvas.addEventListener('mouseup',   () => { touch.left = touch.right = false; });

// ── Init ──────────────────────────────────────────────────────
function initGame(resetScore = true) {
  if (resetScore) score = 0;
  pickups = [];

  player = { x: W / 2, y: H * 0.22, vx: 0, vy: 0, r: PLAYER_R, trail: [] };

  const speedScale = W * 0.28;

  boards = [];
  for (let i = 0; i < BOARD_COUNT; i++) {
    const bw  = W * (0.06 + Math.random() * 0.13);
    // Spread platforms across the screen; cluster more in the middle vertically
    const yBias = H * 0.15 + Math.random() * H * 0.72;
    boards.push({
      x:        Math.random() * W,
      y:        yBias,
      w:        bw,
      h:        BOARD_H,
      angle:    0,
      rotSpeed: (Math.random() - 0.5) * 3.2,   // rad/s
      vx:       (Math.random() - 0.5) * speedScale,
      vy:       (Math.random() - 0.5) * speedScale * 0.35,
      hue:      Math.floor(Math.random() * 360),
    });
  }
}

// ── Physics ───────────────────────────────────────────────────
function resolveCircleOBB(p, b) {
  const ca = Math.cos(b.angle), sa = Math.sin(b.angle);
  const dx = p.x - b.x,  dy = p.y - b.y;

  // World → local (rotate by -angle)
  const lx =  dx * ca + dy * sa;
  const ly = -dx * sa + dy * ca;

  const hw = b.w / 2, hh = b.h / 2;
  const cx = Math.max(-hw, Math.min(hw, lx));
  const cy = Math.max(-hh, Math.min(hh, ly));

  const ex = lx - cx, ey = ly - cy;
  const dist2 = ex * ex + ey * ey;
  if (dist2 >= p.r * p.r) return;

  const dist = Math.sqrt(dist2);
  let nx, ny;
  if (dist < 0.001) {
    const ox = hw - Math.abs(lx), oy = hh - Math.abs(ly);
    if (ox < oy) { nx = lx < 0 ? -1 : 1; ny = 0; }
    else         { nx = 0; ny = ly < 0 ? -1 : 1; }
  } else {
    nx = ex / dist; ny = ey / dist;
  }

  // Local → world (rotate by +angle)
  const wnx = nx * ca - ny * sa;
  const wny = nx * sa + ny * ca;

  // Push out
  const pen = p.r - dist;
  p.x += wnx * pen;
  p.y += wny * pen;

  // Reflect velocity with restitution
  const dot = p.vx * wnx + p.vy * wny;
  if (dot < 0) {
    p.vx -= (1 + RESTITUTION) * dot * wnx;
    p.vy -= (1 + RESTITUTION) * dot * wny;
  }
}

// ── Pickups ───────────────────────────────────────────────────
function spawnPickup() {
  if (pickups.length >= 2) return;
  pickups.push({
    x:     W * 0.1 + Math.random() * W * 0.8,
    y:     H * 0.25 + Math.random() * H * 0.5,
    r:     15,
    phase: Math.random() * Math.PI * 2,
  });
}

function checkPickups() {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    const dx = player.x - pk.x, dy = player.y - pk.y;
    if (dx * dx + dy * dy < (player.r + pk.r) ** 2) {
      score += 2;
      pickups.splice(i, 1);
      showMsg('+2 ⭐');
    }
  }
}

function showMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.textContent = text;
  document.getElementById('msgs').appendChild(el);
  setTimeout(() => el.remove(), 1150);
}

// ── Update (with substeps) ────────────────────────────────────
function update(dt) {
  dt = Math.min(dt, 0.05);
  score += SCORE_PER_SEC * dt;

  const subDt = dt / SUBSTEPS;
  for (let s = 0; s < SUBSTEPS; s++) physicsStep(subDt);

  // Pickups
  if (Math.random() < dt * 0.6) spawnPickup();
  checkPickups();
  pickups.forEach(pk => { pk.phase += dt * 3; });

  // HUD
  document.getElementById('score').textContent = Math.floor(score);
  document.getElementById('best').textContent  = 'Best: ' + maxScore;

  // Danger vignette
  const danger = Math.max(0, (player.y - H * 0.75) / (H * 0.25));
  document.getElementById('vignette').style.opacity = danger;
}

function physicsStep(dt) {
  const moveLeft  = keys['ArrowLeft']  || keys['a'] || keys['A'] || touch.left;
  const moveRight = keys['ArrowRight'] || keys['d'] || keys['D'] || touch.right;
  const speedX = W * 0.44;

  if      (moveLeft)  player.vx = -speedX;
  else if (moveRight) player.vx =  speedX;
  else                player.vx *= Math.pow(0.05, dt);  // friction

  player.vy += GRAVITY * dt;
  player.x  += player.vx * dt;
  player.y  += player.vy * dt;

  // Wall collision
  if (player.x < player.r)     { player.x = player.r;     player.vx =  Math.abs(player.vx) * 0.4; }
  if (player.x > W - player.r) { player.x = W - player.r; player.vx = -Math.abs(player.vx) * 0.4; }

  // Game over
  if (player.y > H + player.r * 3) {
    maxScore = Math.max(maxScore, Math.floor(score));
    const rec = document.getElementById('record-line');
    rec.textContent = maxScore > 0 ? '🏆 Best: ' + maxScore : '';
    document.getElementById('overlay').style.display = 'flex';
    gameState = 'menu';
    return;
  }

  // Boards
  const rotating   = score > ROTATE_AT;
  const speedMult  = score > SPEEDUP_AT ? SPEED_BOOST : 1.0;

  boards.forEach(b => {
    b.x += b.vx * speedMult * dt;
    b.y += b.vy * dt;

    // Bounce off walls
    if (b.x < 0)     { b.vx = Math.abs(b.vx);  b.x = 1; }
    if (b.x > W)     { b.vx = -Math.abs(b.vx); b.x = W - 1; }
    if (b.y < H * 0.08) { b.vy = Math.abs(b.vy);  b.y = H * 0.08 + 1; }
    if (b.y > H * 0.94) { b.vy = -Math.abs(b.vy); b.y = H * 0.94 - 1; }

    if (rotating) b.angle += b.rotSpeed * dt;
    else          b.angle  = 0;

    resolveCircleOBB(player, b);
  });
}

// ── Draw ──────────────────────────────────────────────────────
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,   '#070318');
  g.addColorStop(0.5, '#050215');
  g.addColorStop(1,   '#030110');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Static stars (stable pseudo-random from index)
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (let i = 0; i < 90; i++) {
    const sx = ((Math.sin(i * 127.1) * 0.5 + 0.5)) * W;
    const sy = ((Math.cos(i * 311.7) * 0.5 + 0.5)) * H;
    const sr = (Math.sin(i * 73.3) * 0.5 + 0.5) * 1.4 + 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBoard(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);

  const h  = b.hue;
  const hw = b.w / 2, hh = b.h / 2;
  const r  = hh;   // corner radius

  // Glow
  ctx.shadowColor = `hsl(${h}, 100%, 65%)`;
  ctx.shadowBlur  = 10;

  // Body gradient
  const grad = ctx.createLinearGradient(-hw, -hh, -hw, hh);
  grad.addColorStop(0, `hsl(${h}, 75%, 68%)`);
  grad.addColorStop(1, `hsl(${h}, 55%, 38%)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, b.w, b.h, r);
  ctx.fill();

  // Highlight strip
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, b.w, b.h * 0.38, r);
  ctx.fill();

  ctx.restore();
}

function drawPlayer(p) {
  ctx.save();
  ctx.translate(p.x, p.y);

  // Outer glow
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur  = 28;

  // Radial gradient body
  const grad = ctx.createRadialGradient(-p.r * 0.3, -p.r * 0.35, 0, 0, 0, p.r);
  grad.addColorStop(0,   '#ffffff');
  grad.addColorStop(0.35,'#55ffff');
  grad.addColorStop(0.7, '#00aaff');
  grad.addColorStop(1,   '#003399');

  ctx.beginPath();
  ctx.arc(0, 0, p.r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Rim
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = 'rgba(200,240,255,0.55)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  ctx.restore();
}

function drawPickup(pk) {
  ctx.save();
  ctx.translate(pk.x, pk.y + Math.sin(pk.phase) * 6);

  ctx.shadowColor = '#ffdd00';
  ctx.shadowBlur  = 20;
  ctx.fillStyle   = '#ffe020';
  ctx.strokeStyle = '#ff7700';
  ctx.lineWidth   = 1.5;

  // 5-pointed star
  const spikes = 5, inner = pk.r * 0.42;
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const ang = (i * Math.PI / spikes) - Math.PI / 2;
    const r   = i % 2 === 0 ? pk.r : inner;
    i === 0 ? ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r)
            : ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

function drawDifficultyHint() {
  // Show hint when rotation activates
  if (score > ROTATE_AT - 0.5 && score < ROTATE_AT + 3) {
    const alpha = Math.min(1, (score - (ROTATE_AT - 0.5)) * 2) *
                  Math.max(0, 1 - (score - ROTATE_AT) / 3);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = '#ff8844';
    ctx.font        = `bold ${Math.round(H * 0.033)}px Segoe UI, Arial`;
    ctx.textAlign   = 'center';
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur  = 12;
    ctx.fillText('Platforms are rotating!', W / 2, H * 0.12);
    ctx.restore();
  }
  if (score > SPEEDUP_AT - 0.5 && score < SPEEDUP_AT + 3) {
    const alpha = Math.min(1, (score - (SPEEDUP_AT - 0.5)) * 2) *
                  Math.max(0, 1 - (score - SPEEDUP_AT) / 3);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = '#ff4444';
    ctx.font        = `bold ${Math.round(H * 0.033)}px Segoe UI, Arial`;
    ctx.textAlign   = 'center';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur  = 12;
    ctx.fillText('Speed up!', W / 2, H * 0.12);
    ctx.restore();
  }
}

function draw() {
  drawBackground();
  boards.forEach(drawBoard);
  pickups.forEach(drawPickup);
  drawPlayer(player);
  drawDifficultyHint();
}

// ── Game loop ─────────────────────────────────────────────────
function loop(ts) {
  if (gameState !== 'playing') return;

  const dt = lastTime == null ? 0.016 : (ts - lastTime) / 1000;
  lastTime = ts;

  update(dt);

  if (gameState === 'playing') {
    draw();
    raf = requestAnimationFrame(loop);
  }
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  initGame();
  gameState = 'playing';
  lastTime  = null;
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click', startGame);

// Also allow spacebar / Enter to start from menu
document.addEventListener('keydown', e => {
  if (gameState === 'menu' && (e.key === ' ' || e.key === 'Enter')) startGame();
});

// Draw static background while on menu
(function menuBg() {
  if (gameState === 'menu') {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    requestAnimationFrame(menuBg);
  }
})();
</script>
</body>
</html>
